# Only Postgres is actually used by this drop (the Go API). Redis/Qdrant/R2
# come back into docker-compose once the indexing pipeline and workers are
# implemented — see docs/09-deployment.md#deployment-architecture.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: courseassistant
      POSTGRES_PASSWORD: courseassistant
      POSTGRES_DB: courseassistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseassistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
