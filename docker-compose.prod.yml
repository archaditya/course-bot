version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: course-bot-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-courseassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courseassistant}
      POSTGRES_DB: ${POSTGRES_DB:-courseassistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseassistant}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: course-bot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: course-bot-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ai-service:
    build:
      context: .
      dockerfile: build/docker/ai-service.Dockerfile
    container_name: course-bot-ai-service
    restart: always
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  api:
    build:
      context: .
      dockerfile: build/docker/api.Dockerfile
    container_name: course-bot-api
    restart: always
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-courseassistant}:${POSTGRES_PASSWORD:-courseassistant}@postgres:5432/${POSTGRES_DB:-courseassistant}?sslmode=disable
      REDIS_URL: redis:6379
      QDRANT_URL: http://qdrant:6333
      AI_SERVICE_URL: http://ai-service:8000
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: build/docker/worker.Dockerfile
    container_name: course-bot-worker
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-courseassistant}:${POSTGRES_PASSWORD:-courseassistant}@postgres:5432/${POSTGRES_DB:-courseassistant}?sslmode=disable
      REDIS_URL: redis:6379
      QDRANT_URL: http://qdrant:6333
      AI_SERVICE_URL: http://ai-service:8000
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: build/docker/frontend.Dockerfile
    container_name: course-bot-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
